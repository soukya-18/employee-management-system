{% extends "layout.html" %}

{% block content %}

<h2>My Profile</h2>

<div class="card p-4 shadow" style="max-width:500px">

<p><b>Name:</b> {{emp.name}}</p>

<p><b>Email:</b> {{emp.email}}</p>

<p><b>Department:</b> {{emp.department}}</p>

<p><b>Salary:</b> {{emp.salary}}</p>

{% if emp.photo %}

<img src="/static/uploads/{{emp.photo}}" width="120" class="rounded-circle">

{% endif %}
<br><br>

<a href="{{ url_for('change_password') }}" class="btn btn-warning">
Change Password
</a>

</div>

{% endblock %}
